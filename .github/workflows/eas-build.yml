name: EAS Build

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      # Checkout
      - name: Checkout repo
        uses: actions/checkout@v4

      # Node setup
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: yarn

      # Install jq
      - name: Install jq
        run: sudo apt-get update && sudo apt-get install -y jq

      # Setup EAS CLI + login
      - name: Setup EAS
        uses: expo/expo-github-action@v8
        with:
          eas-version: latest
          token: ${{ secrets.EXPO_TOKEN }}

      # Install dependencies (root - works for monorepo too)
      - name: Install dependencies
        run: yarn install --frozen-lockfile

      # Verify Expo login (fail if not logged in)
      - name: Verify Expo login
        run: npx expo whoami || exit 1

      # Run EAS Build and capture output
      - name: Run EAS Build
        id: eas_build
        working-directory: ./apps/mobile-app
        env:
          EAS_BUILD_NO_EXPO_GO_WARNING: "true"
        run: |
          echo "Starting EAS Build..."

          BUILD_OUTPUT=$(eas build \
            --platform android \
            --profile preview \
            --non-interactive \
            --wait \
            --json)

          echo "$BUILD_OUTPUT"

          # Extract URLs safely (handles both array & object)
          BUILD_URL=$(echo "$BUILD_OUTPUT" | jq -r '.[0].artifacts.buildUrl // .artifacts.buildUrl')
          DETAILS_URL=$(echo "$BUILD_OUTPUT" | jq -r '.[0].buildDetailsPageUrl // .buildDetailsPageUrl')

          echo "BUILD_URL=$BUILD_URL" >> $GITHUB_ENV
          echo "DETAILS_URL=$DETAILS_URL" >> $GITHUB_ENV

      # Print links in logs
      - name: Show Build Links
        run: |
          echo "APK Download URL: $BUILD_URL"
          echo "Build Details Page: $DETAILS_URL"

      # Add to GitHub Summary
      - name: Add Build Links to Summary
        run: |
          echo "## EAS Build Completed" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "- [Download APK]($BUILD_URL)" >> $GITHUB_STEP_SUMMARY
          echo "- [View Build Details]($DETAILS_URL)" >> $GITHUB_STEP_SUMMARY
